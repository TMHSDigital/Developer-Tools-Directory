# release-drafter aggregates merged PRs into categorized change notes.
# Versioning is owned by the VERSION file at the repo root; release.yml
# creates the tag and release using that version. Drafter does NOT compute
# or emit a version here (no version-resolver, no name-template, no
# tag-template) to avoid stale metadata in release bodies.
template: |
  ## What's Changed

  $CHANGES
categories:
  - title: "Features"
    labels:
      - "feature"
      - "registry"
  - title: "Standards"
    labels:
      - "standards"
  - title: "Scaffold"
    labels:
      - "scaffold"
  - title: "Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "CI / Infrastructure"
    labels:
      - "ci"
      - "infrastructure"
      - "dependencies"
  - title: "Other Changes"
    labels:
      - "*"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
exclude-labels:
  - "skip-changelog"
autolabeler:
  - label: "documentation"
    files:
      - "*.md"
      - "docs/**"
  - label: "ci"
    files:
      - ".github/**"
  - label: "standards"
    files:
      - "standards/**"
  - label: "scaffold"
    files:
      - "scaffold/**"
  - label: "registry"
    files:
      - "registry.json"
