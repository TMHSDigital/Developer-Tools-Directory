name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-registry:
    name: Validate registry.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON syntax
        run: python3 -c "import json; json.load(open('registry.json'))"

      - name: Validate registry schema
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, sys
          data = json.load(open("registry.json"))
          assert isinstance(data, list), "registry.json must be an array"
          SCHEMA = {
            "name": str,
            "repo": str,
            "slug": str,
            "description": str,
            "type": str,
            "homepage": str,
            "skills": int,
            "rules": int,
            "mcpTools": int,
            "extras": dict,
            "topics": list,
            "status": str,
            "version": str,
            "language": str,
            "license": str,
            "pagesType": str,
            "hasCI": bool,
          }
          OPTIONAL = {"npm": str}
          VALID_TYPES = {"cursor-plugin", "mcp-server"}
          VALID_STATUS = {"experimental", "beta", "active", "maintenance", "deprecated", "archived"}
          VALID_PAGES = {"static", "mkdocs", "none"}
          errors = []
          for i, tool in enumerate(data):
            label = "Entry %d (%s)" % (i, tool.get("name", "?"))
            for field, expected_type in SCHEMA.items():
              if field not in tool:
                errors.append("%s: missing required field '%s'" % (label, field))
              elif not isinstance(tool[field], expected_type):
                errors.append("%s: '%s' must be %s, got %s" % (label, field, expected_type.__name__, type(tool[field]).__name__))
            for field, expected_type in OPTIONAL.items():
              if field in tool and not isinstance(tool[field], expected_type):
                errors.append("%s: optional '%s' must be %s" % (label, field, expected_type.__name__))
            if tool.get("type") not in VALID_TYPES:
              errors.append("%s: type must be one of %s" % (label, VALID_TYPES))
            if tool.get("status") not in VALID_STATUS:
              errors.append("%s: status must be one of %s" % (label, VALID_STATUS))
            if tool.get("pagesType") not in VALID_PAGES:
              errors.append("%s: pagesType must be one of %s" % (label, VALID_PAGES))
            if not isinstance(tool.get("topics", []), list):
              pass
            elif not all(isinstance(t, str) for t in tool.get("topics", [])):
              errors.append("%s: topics must be array of strings" % label)
          if errors:
            for e in errors:
              print("::error::" + e, file=sys.stderr)
            sys.exit(1)
          print("Registry valid: %d tools" % len(data))
          PYEOF

  validate-docs:
    name: Validate docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check docs/index.html exists
        run: test -f docs/index.html

  validate-scaffold:
    name: Validate scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install Jinja2

      - name: Check scaffold syntax
        run: python3 -m py_compile scaffold/create-tool.py

      - name: Test scaffold dry run
        run: |
          python3 scaffold/create-tool.py \
            --name "CI Test Plugin" \
            --description "Automated test" \
            --mcp-server \
            --skills 2 \
            --rules 1 \
            --output /tmp/scaffold-test

          test -f /tmp/scaffold-test/ci-test-plugin/.cursor-plugin/plugin.json
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/validate.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/pages.yml
          test -f /tmp/scaffold-test/ci-test-plugin/site.json
          test -f /tmp/scaffold-test/ci-test-plugin/mcp-tools.json
          test -f /tmp/scaffold-test/ci-test-plugin/mcp-server/server.py
          echo "Scaffold test passed"

      - name: Scaffold leak scan
        run: |
          if grep -rnE "tmhospitalitystrateg[i]es" /tmp/scaffold-test; then
            echo "::error::Scaffold output contains the old business email. Update scaffold/create-tool.py default."
            exit 1
          fi

  sync-check:
    name: Registry sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check derived artifacts match registry
        run: python3 scripts/sync_from_registry.py --check

  safety-scan:
    name: Public-repo safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: No business email leak
        run: |
          # Pattern uses a character class so this workflow file does not match itself.
          if grep -rnE --include='*.py' --include='*.md' --include='*.j2' --include='*.json' --include='*.html' "tmhospitalitystrateg[i]es" . ; then
            echo "::error::Remove the real business email. Use contact@users.noreply.github.com or a placeholder."
            exit 1
          fi

      - name: No local filesystem paths in docs
        run: |
          if grep -rnE --include='*.md' '(^|[^A-Za-z])[A-Z]:\\' . ; then
            echo "::error::Windows drive-letter paths leaked in documentation. Replace with generic /path/to/... or \$VAR."
            exit 1
          fi
          if grep -rnE --include='*.md' '/Users/[A-Za-z0-9_-]+/|/home/[A-Za-z0-9_-]+/' . ; then
            echo "::error::Home directory paths leaked in documentation. Replace with generic paths."
            exit 1
          fi

      - name: No unsafe DOM sinks in catalog site
        run: |
          if grep -rnE --include='*.js' --include='*.html' 'innerHTML|outerHTML|\beval\(|new Function\(' docs/ ; then
            echo "::error::Unsafe DOM sink reintroduced in docs/. Use textContent; never eval registry data."
            exit 1
          fi

      - name: No committed secrets
        run: |
          if git ls-files | grep -E '(^|/)\.env$|secrets\.json$|\.pem$|\.key$|\.p12$' ; then
            echo "::error::Credential file committed. Remove and rotate any exposed secret."
            exit 1
          fi

  version-bump-check:
    name: feat/fix commits require VERSION bump
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify VERSION bump accompanies feat/fix commits
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          COMMITS="$(git log "${BASE_SHA}..${HEAD_SHA}" --pretty=format:'%H%x00%s%x00%b%x1e')"

          if [ -z "$COMMITS" ]; then
            echo "No new commits to check."
            exit 0
          fi

          NEEDS_BUMP="false"
          while IFS= read -r -d $'\x1e' record; do
            [ -z "$record" ] && continue
            SHA="$(echo "$record" | awk -F '\0' '{print $1}')"
            SUBJECT="$(echo "$record" | awk -F '\0' '{print $2}')"
            BODY="$(echo "$record" | awk -F '\0' '{print $3}')"

            # Escape hatch: commit opts out.
            if echo "$SUBJECT $BODY" | grep -qF '[skip version]'; then
              echo "skip  | $SHA | $SUBJECT  (opted out with [skip version])"
              continue
            fi

            if echo "$SUBJECT" | grep -qiE '^(feat|fix)(\([^)]*\))?!?:'; then
              echo "need  | $SHA | $SUBJECT"
              NEEDS_BUMP="true"
            else
              echo "ok    | $SHA | $SUBJECT"
            fi
          done <<< "$COMMITS"

          if [ "$NEEDS_BUMP" = "false" ]; then
            echo "No feat: or fix: commits in this PR. VERSION bump not required."
            exit 0
          fi

          if git diff --name-only "${BASE_SHA}..${HEAD_SHA}" | grep -qxF 'VERSION'; then
            echo "VERSION was modified in this PR. Check passed."
            exit 0
          fi

          echo "::error::feat: or fix: commits require a VERSION bump. Update VERSION and commit before merging. Use '[skip version]' in the commit subject or body to opt out for workflow-only changes."
          exit 1
