name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-registry:
    name: Validate registry.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON syntax
        run: python3 -c "import json; json.load(open('registry.json'))"

      - name: Validate registry schema
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, sys
          data = json.load(open("registry.json"))
          assert isinstance(data, list), "registry.json must be an array"
          SCHEMA = {
            "name": str,
            "repo": str,
            "slug": str,
            "description": str,
            "type": str,
            "homepage": str,
            "skills": int,
            "rules": int,
            "mcpTools": int,
            "extras": dict,
            "topics": list,
            "status": str,
            "version": str,
            "language": str,
            "license": str,
            "pagesType": str,
            "hasCI": bool,
          }
          OPTIONAL = {"npm": str}
          VALID_TYPES = {"cursor-plugin", "mcp-server"}
          VALID_STATUS = {"experimental", "beta", "active", "maintenance", "deprecated", "archived"}
          VALID_PAGES = {"static", "mkdocs", "none"}
          errors = []
          for i, tool in enumerate(data):
            label = "Entry %d (%s)" % (i, tool.get("name", "?"))
            for field, expected_type in SCHEMA.items():
              if field not in tool:
                errors.append("%s: missing required field '%s'" % (label, field))
              elif not isinstance(tool[field], expected_type):
                errors.append("%s: '%s' must be %s, got %s" % (label, field, expected_type.__name__, type(tool[field]).__name__))
            for field, expected_type in OPTIONAL.items():
              if field in tool and not isinstance(tool[field], expected_type):
                errors.append("%s: optional '%s' must be %s" % (label, field, expected_type.__name__))
            if tool.get("type") not in VALID_TYPES:
              errors.append("%s: type must be one of %s" % (label, VALID_TYPES))
            if tool.get("status") not in VALID_STATUS:
              errors.append("%s: status must be one of %s" % (label, VALID_STATUS))
            if tool.get("pagesType") not in VALID_PAGES:
              errors.append("%s: pagesType must be one of %s" % (label, VALID_PAGES))
            if not isinstance(tool.get("topics", []), list):
              pass
            elif not all(isinstance(t, str) for t in tool.get("topics", [])):
              errors.append("%s: topics must be array of strings" % label)
          if errors:
            for e in errors:
              print("::error::" + e, file=sys.stderr)
            sys.exit(1)
          print("Registry valid: %d tools" % len(data))
          PYEOF

  validate-docs:
    name: Validate docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check docs/index.html exists
        run: test -f docs/index.html

  validate-scaffold:
    name: Validate scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install Jinja2 PyYAML

      - name: Check scaffold syntax
        run: python3 -m py_compile scaffold/create-tool.py

      - name: Test scaffold dry run
        run: |
          python3 scaffold/create-tool.py \
            --name "CI Test Plugin" \
            --description "Automated test" \
            --mcp-server \
            --skills 2 \
            --rules 1 \
            --output /tmp/scaffold-test

          test -f /tmp/scaffold-test/ci-test-plugin/.cursor-plugin/plugin.json
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/validate.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/release.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/pages.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/stale.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/drift-check.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/workflows/label-sync.yml
          test -f /tmp/scaffold-test/ci-test-plugin/.github/dependabot.yml
          test -f /tmp/scaffold-test/ci-test-plugin/site.json
          test -f /tmp/scaffold-test/ci-test-plugin/mcp-tools.json
          test -f /tmp/scaffold-test/ci-test-plugin/mcp-server/server.py
          echo "Scaffold test passed"

      - name: Scaffold YAML well-formed
        run: |
          # Catches Jinja2 trim_blocks bugs that collapse adjacent expression lines.
          python3 -c "
          import yaml, sys
          paths = [
              '/tmp/scaffold-test/ci-test-plugin/.github/workflows/validate.yml',
              '/tmp/scaffold-test/ci-test-plugin/.github/workflows/release.yml',
              '/tmp/scaffold-test/ci-test-plugin/.github/workflows/pages.yml',
              '/tmp/scaffold-test/ci-test-plugin/.github/workflows/stale.yml',
              '/tmp/scaffold-test/ci-test-plugin/.github/workflows/drift-check.yml',
              '/tmp/scaffold-test/ci-test-plugin/.github/workflows/label-sync.yml',
              '/tmp/scaffold-test/ci-test-plugin/.github/dependabot.yml',
          ]
          fail = False
          for p in paths:
              try:
                  with open(p) as f:
                      yaml.safe_load(f)
                  print(f'OK  {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL {p}: {e}', file=sys.stderr)
                  fail = True
          sys.exit(1 if fail else 0)
          "

      - name: Scaffold regression checks for DTD#41 patterns
        run: |
          # validate-counts job present
          grep -q 'validate-counts' /tmp/scaffold-test/ci-test-plugin/.github/workflows/validate.yml \
            || { echo "::error::validate.yml missing validate-counts job"; exit 1; }

          # drift-check pinned to @v1.9
          grep -q 'drift-check@v1.9' /tmp/scaffold-test/ci-test-plugin/.github/workflows/drift-check.yml \
            || { echo "::error::drift-check.yml not pinned to @v1.9"; exit 1; }

          # release.yml consumes release-doc-sync@v1
          grep -q 'release-doc-sync@v1' /tmp/scaffold-test/ci-test-plugin/.github/workflows/release.yml \
            || { echo "::error::release.yml does not consume release-doc-sync@v1"; exit 1; }

          # release.yml has the initial-release version-handling branch
          grep -q 'Initial release' /tmp/scaffold-test/ci-test-plugin/.github/workflows/release.yml \
            || { echo "::error::release.yml missing initial-release branch"; exit 1; }

          # release.yml does floating tag automation
          grep -q 'tag -f "v\$major"' /tmp/scaffold-test/ci-test-plugin/.github/workflows/release.yml \
            || { echo "::error::release.yml missing floating major tag automation"; exit 1; }

          # label-sync uses self-healing per-label gh label create --force
          grep -q 'gh label create.*--force' /tmp/scaffold-test/ci-test-plugin/.github/workflows/label-sync.yml \
            || { echo "::error::label-sync.yml missing self-healing label create"; exit 1; }

          # dependabot has github-actions ecosystem
          grep -q 'package-ecosystem: "github-actions"' /tmp/scaffold-test/ci-test-plugin/.github/dependabot.yml \
            || { echo "::error::dependabot.yml missing github-actions ecosystem"; exit 1; }

          # CLAUDE.md has **Version:** line so release-doc-sync can update it
          grep -q '^\*\*Version:\*\* 0\.1\.0' /tmp/scaffold-test/ci-test-plugin/CLAUDE.md \
            || { echo "::error::CLAUDE.md missing **Version:** 0.1.0 line"; exit 1; }

          # ROADMAP.md has standards-version marker and **Current:** line
          grep -q '<!-- standards-version:' /tmp/scaffold-test/ci-test-plugin/ROADMAP.md \
            || { echo "::error::ROADMAP.md missing standards-version marker"; exit 1; }
          grep -q '^\*\*Current:\*\* v0\.1\.0' /tmp/scaffold-test/ci-test-plugin/ROADMAP.md \
            || { echo "::error::ROADMAP.md missing **Current:** v0.1.0 line"; exit 1; }

          # AGENTS.md keeps standards-version marker
          grep -q '<!-- standards-version:' /tmp/scaffold-test/ci-test-plugin/AGENTS.md \
            || { echo "::error::AGENTS.md missing standards-version marker"; exit 1; }

          # LICENSE has correct CC-BY-NC-ND-4.0 copyright (TM Hospitality Strategies, not TMHSDigital)
          grep -q 'Copyright (c) 2026 TM Hospitality Strategies' /tmp/scaffold-test/ci-test-plugin/LICENSE \
            || { echo "::error::LICENSE missing canonical 'TM Hospitality Strategies' copyright line"; exit 1; }
          grep -q 'SPDX-License-Identifier: CC-BY-NC-ND-4.0' /tmp/scaffold-test/ci-test-plugin/LICENSE \
            || { echo "::error::LICENSE missing SPDX-License-Identifier"; exit 1; }

          # CONTRIBUTING.md has DCO inbound grant section
          grep -q 'Developer Certificate of Origin' /tmp/scaffold-test/ci-test-plugin/CONTRIBUTING.md \
            || { echo "::error::CONTRIBUTING.md missing DCO section"; exit 1; }
          grep -q 'Signed-off-by' /tmp/scaffold-test/ci-test-plugin/CONTRIBUTING.md \
            || { echo "::error::CONTRIBUTING.md missing Signed-off-by guidance"; exit 1; }

          echo "All DTD#41 scaffold regression checks passed"

      - name: Scaffold leak scan
        run: |
          if grep -rnE "tmhospitalitystrateg[i]es" /tmp/scaffold-test; then
            echo "::error::Scaffold output contains the old business email. Update scaffold/create-tool.py default."
            exit 1
          fi

  sync-check:
    name: Registry sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check derived artifacts match registry
        run: python3 scripts/sync_from_registry.py --check

  safety-scan:
    name: Public-repo safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: No business email leak
        run: |
          # Pattern uses a character class so this workflow file does not match itself.
          if grep -rnE --include='*.py' --include='*.md' --include='*.j2' --include='*.json' --include='*.html' "tmhospitalitystrateg[i]es" . ; then
            echo "::error::Remove the real business email. Use contact@users.noreply.github.com or a placeholder."
            exit 1
          fi

      - name: No local filesystem paths in docs
        run: |
          if grep -rnE --include='*.md' '(^|[^A-Za-z])[A-Z]:\\' . ; then
            echo "::error::Windows drive-letter paths leaked in documentation. Replace with generic /path/to/... or \$VAR."
            exit 1
          fi
          if grep -rnE --include='*.md' '/Users/[A-Za-z0-9_-]+/|/home/[A-Za-z0-9_-]+/' . ; then
            echo "::error::Home directory paths leaked in documentation. Replace with generic paths."
            exit 1
          fi

      - name: No unsafe DOM sinks in catalog site
        run: |
          if grep -rnE --include='*.js' --include='*.html' 'innerHTML|outerHTML|\beval\(|new Function\(' docs/ ; then
            echo "::error::Unsafe DOM sink reintroduced in docs/. Use textContent; never eval registry data."
            exit 1
          fi

      - name: No committed secrets
        run: |
          if git ls-files | grep -E '(^|/)\.env$|secrets\.json$|\.pem$|\.key$|\.p12$' ; then
            echo "::error::Credential file committed. Remove and rotate any exposed secret."
            exit 1
          fi

  version-bump-check:
    name: feat/fix commits require VERSION bump
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify VERSION bump accompanies feat/fix commits
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # DTD#24: field separator must NOT be NUL (\x00). Bash command
          # substitution silently strips NUL bytes (with a warning to
          # stderr that nothing inspects), gluing SHA+SUBJECT+BODY into
          # one field and breaking the awk parse downstream. Use \x1f
          # (Unit Separator) which preserves cleanly through bash. The
          # record separator (\x1e Record Separator) was already safe.
          COMMITS="$(git log "${BASE_SHA}..${HEAD_SHA}" --pretty=format:'%H%x1f%s%x1f%b%x1e')"

          if [ -z "$COMMITS" ]; then
            echo "No new commits to check."
            exit 0
          fi

          NEEDS_BUMP="false"
          while IFS= read -r -d $'\x1e' record; do
            [ -z "$record" ] && continue
            SHA="$(echo "$record" | awk -F $'\x1f' '{print $1}')"
            SUBJECT="$(echo "$record" | awk -F $'\x1f' '{print $2}')"
            BODY="$(echo "$record" | awk -F $'\x1f' '{print $3}')"

            # Escape hatch: commit opts out.
            if echo "$SUBJECT $BODY" | grep -qF '[skip version]'; then
              echo "skip  | $SHA | $SUBJECT  (opted out with [skip version])"
              continue
            fi

            if echo "$SUBJECT" | grep -qiE '^(feat|fix)(\([^)]*\))?!?:'; then
              echo "need  | $SHA | $SUBJECT"
              NEEDS_BUMP="true"
            else
              echo "ok    | $SHA | $SUBJECT"
            fi
          done <<< "$COMMITS"

          if [ "$NEEDS_BUMP" = "false" ]; then
            echo "No feat: or fix: commits in this PR. VERSION bump not required."
            exit 0
          fi

          if git diff --name-only "${BASE_SHA}..${HEAD_SHA}" | grep -qxF 'VERSION'; then
            echo "VERSION was modified in this PR. Check passed."
            exit 0
          fi

          echo "::error::feat: or fix: commits require a VERSION bump. Update VERSION and commit before merging. Use '[skip version]' in the commit subject or body to opt out for workflow-only changes."
          exit 1
